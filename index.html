<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie | موقع الطعام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: #f8f8f8;
}
header {
    background: #ff5722;
    color: white;
    padding: 20px;
    text-align: center;
}
nav {
    display: flex;
    justify-content: center;
    background: #333;
}
nav a {
    color: white;
    padding: 15px 20px;
    text-decoration: none;
}
nav a:hover {
    background: #ff5722;
}
.hero {
    background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center/cover;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 30px;
}
.container {
    padding: 20px;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}
.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.card img {
    width: 100%;
}
.card h3 {
    padding: 10px;
}
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>
<body>

<header>
<h1>🍔 Foodie</h1>
<p>أفضل موقع للأكلات والوصفات</p>
</header>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الوصفات</a>
<a href="#">مطاعم</a>
<a href="#">تواصل</a>
</nav>

<div class="hero">
أهلاً بك في عالم الطعام 🍕
</div>

<div class="container">
<h2>أشهر الأكلات</h2>
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<h3>بيتزا</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<h3>برجر</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
<h3>سلطة صحية</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1529042410759-befb1204b468">
<h3>حلويات</h3>
</div>

</div>
</div>

<footer>
© 2026 جميع الحقوق محفوظة | Foodie
</footer>

</body>
</html>
